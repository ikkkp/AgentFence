name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-binaries:
    name: Rust binaries (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            exe: ".exe"
          - os: macos-latest
            name: macos-arm64
            exe: ""
          - os: ubuntu-latest
            name: linux-x64
            exe: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        run: cargo build --release --bin agentfence --bin agentfenced
      - name: Stage CLI archive
        shell: pwsh
        run: |
          ./packaging/package-cli.ps1 `
            -Name "${{ matrix.name }}" `
            -ExeSuffix "${{ matrix.exe }}" `
            -Version "${{ github.ref_name }}" `
            -Repository "${{ github.repository }}" `
            -Commit "${{ github.sha }}"
      - uses: actions/upload-artifact@v4
        with:
          name: agentfence-${{ matrix.name }}
          path: |
            dist/agentfence-${{ matrix.name }}.zip
            dist/agentfence-${{ matrix.name }}.checksums.json
          if-no-files-found: error

  desktop-bundles:
    name: Desktop bundle (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            exe: ".exe"
          - os: macos-latest
            name: macos-arm64
            exe: ""
          - os: ubuntu-latest
            name: linux-x64
            exe: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build desktop bundle
        run: pnpm --filter @agentfence/desktop tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: agentfence-desktop-${{ matrix.name }}
          path: |
            target/release/bundle/**
            target/release/agentfence-desktop${{ matrix.exe }}
          if-no-files-found: warn

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-binaries, desktop-bundles]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.json
            release-assets/**/*.msi
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.rpm
