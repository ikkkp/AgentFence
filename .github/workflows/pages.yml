name: GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/configure-pages@v5
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter @agentfence/web build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: "/AgentFence"
          NEXT_PUBLIC_SITE_URL: "https://${{ github.repository_owner }}.github.io/AgentFence"
      - name: Disable Jekyll
        run: touch apps/web/out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy static site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
